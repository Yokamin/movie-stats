<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Personal movie & TV statistics dashboard" />
  <title>MovieStats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="loading" class="loading-screen">
    <div class="loading-inner">
      <div class="loading-logo">MOVIE<span class="accent">STATS</span></div>
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading your watchlist…</p>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <nav class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-logo">MOVIE<span class="accent">STATS</span></span>
      <button class="icon-btn" id="drawerClose" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <ul class="drawer-nav">
      <li><a href="#home"             class="drawer-link" data-title="Home">Home</a></li>
      <li class="drawer-sep"></li>
      <li><a href="#movies"           class="drawer-link" data-title="Watchlist">Watchlist</a></li>
      <li class="drawer-sep"></li>
      <li><a href="#genres"           class="drawer-link" data-title="Genres">Genres</a></li>
      <li><a href="#directors"        class="drawer-link" data-title="Directors">Directors</a></li>
      <li><a href="#actors"           class="drawer-link" data-title="Actors">Actors</a></li>
      <li><a href="#writers"          class="drawer-link" data-title="Writers">Writers</a></li>
      <li><a href="#composers"        class="drawer-link" data-title="Composers">Composers</a></li>
      <li><a href="#cinematographers" class="drawer-link" data-title="Cinematographers">Cinematographers</a></li>
      <li class="drawer-sep"></li>
      <li><a href="#timeline"         class="drawer-link" data-title="Timeline">Timeline</a></li>
      <li><a href="#countries"        class="drawer-link" data-title="Countries">Countries</a></li>
      <li class="drawer-sep"></li>
      <li><a href="#failed"           class="drawer-link" data-title="Not Found">Not Found</a></li>
    </ul>
  </nav>

  <header class="topbar" id="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="topbar-title" id="topbarTitle">MovieStats</span>
    <div class="topbar-action" id="topbarAction"></div>
  </header>

  <main class="main-content" id="mainContent"></main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
