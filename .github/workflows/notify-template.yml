# ============================================================
# THIS FILE GOES IN THE DATA REPO (movie-stats-data), NOT HERE
# Save it as .github/workflows/notify.yml in that repo
# ============================================================

name: Notify movie-stats on CSV update

on:
  push:
    paths:
      - '*.csv'   # only triggers when a CSV file changes

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger enrichment in movie-stats
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Yokamin/movie-stats/dispatches \
            -d '{"event_type":"csv-updated"}'
